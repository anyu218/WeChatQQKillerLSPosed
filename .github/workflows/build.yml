# ============================================================
# PriorityLocker Pro — 纯 ./gradlew 构建（无缓存，最高兼容性）
# ============================================================
name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: "构建 ${{ inputs.build_type || 'release' }} APK"
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # 1. 检出代码
      # --------------------------------------------------
      - name: 检出仓库
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. JDK 17（AGP 8.x + Gradle 8.x 必需）
      # --------------------------------------------------
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      # --------------------------------------------------
      # 3. 确认 SDK 版本
      # --------------------------------------------------
      - name: 安装 Android SDK 组件
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            2>&1 | tail -5 || echo "⚠️ sdkmanager 不可用，尝试默认 SDK"

      # --------------------------------------------------
      # 4. 诊断环境
      # --------------------------------------------------
      - name: 诊断环境
        run: |
          echo "## 🔧 环境诊断" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "PWD: $(pwd)"
          java -version 2>&1
          echo "GRADLE_VERSION via wrapper:" 
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 || echo "gradlew --version failed"
          echo '```' >> $GITHUB_STEP_SUMMARY

      # --------------------------------------------------
      # 5. 构建 APK（纯 wrapper，无缓存依赖）
      # --------------------------------------------------
      - name: 构建 APK
        run: |
          BUILD_TYPE="${{ inputs.build_type || 'release' }}"
          echo "📦 构建类型: ${BUILD_TYPE}"
          # 首字母大写 (release -> Release, debug -> Debug)
          CAP_TYPE=$(echo "${BUILD_TYPE}" | sed 's/^./\U&/')
          echo "🧩 命名空间: com.murong.prioritylocker"
          echo ""

          echo "## 📋 Gradle 构建日志" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '<details><summary>点击展开构建日志</summary>' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          ./gradlew assemble${CAP_TYPE} --no-daemon --stacktrace 2>&1
          RESULT=$?
          echo "=== 构建退出码: ${RESULT} ==="
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo '</details>' >> $GITHUB_STEP_SUMMARY
          exit ${RESULT}

      # --------------------------------------------------
      # 6. 上传 APK 为构建产物
      # --------------------------------------------------
      - name: 上传 APK 产物
        uses: actions/upload-artifact@v4
        with:
          name: "PriorityLocker-Pro-${{ inputs.build_type || 'release' }}"
          path: |
            app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      # --------------------------------------------------
      # 7. 输出 APK 摘要
      # --------------------------------------------------
      - name: APK 信息
        run: |
          echo "## ✅ 构建产物" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '| 文件 | 大小 |' >> $GITHUB_STEP_SUMMARY
          echo '|------|------|' >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk -name "*.apk" | while read apk; do
            SIZE=$(du -h "$apk" | cut -f1)
            NAME=$(basename "$apk")
            echo "| \`${NAME}\` | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
          done

      # --------------------------------------------------
      # 8. 如果打了 tag，上传到 Release
      # --------------------------------------------------
      - name: 上传到 Release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk

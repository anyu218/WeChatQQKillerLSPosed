# ============================================================
# PriorityLocker Pro — 调试版：关键信息写入 Step Summary
# ============================================================
name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: "构建 ${{ inputs.build_type || 'release' }} APK"
    runs-on: ubuntu-latest

    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: 安装 Android SDK 组件
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            2>&1 | tail -5 || echo "⚠️ sdkmanager 不可用，尝试默认 SDK"

      - name: 诊断环境
        run: |
          echo "## 🔧 环境诊断" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "PWD: $(pwd)"
          java -version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "GRADLE_VERSION via wrapper:" 
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 || echo "gradlew --version failed"
          echo '```' >> $GITHUB_STEP_SUMMARY

      - name: 构建 APK
        continue-on-error: true
        run: |
          BUILD_TYPE="${{ inputs.build_type || 'release' }}"
          echo "📦 构建类型: ${BUILD_TYPE}"
          CAP_TYPE=$(echo "${BUILD_TYPE}" | sed 's/^./\U&/')
          echo "🧩 命名空间: com.murong.prioritylocker"
          echo ""

          # 捕获完整日志
          ./gradlew assemble${CAP_TYPE} --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          echo "EXIT_CODE=${PIPESTATUS[0]}" > /tmp/gradle-exit-code.txt
          echo "=== 构建退出码: ${PIPESTATUS[0]} ==="

      - name: 分析构建日志
        if: always()
        run: |
          echo "## 📋 构建日志分析" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f /tmp/gradle-build.log ]; then
            LOG="/tmp/gradle-build.log"
            LINES=$(wc -l < "$LOG")
            echo "**日志行数**: ${LINES}" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # 提取 ERROR / FAIL / Could not resolve 等关键行
            echo "### 🔴 错误摘要" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -i -E "(error|FAIL|Could not resolve|Unresolved|Unable to|No such property|Cannot resolve|BUILD FAILED)" "$LOG" 2>/dev/null | head -30 || echo "(无匹配)"
            echo '```' >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY

            # 最后 60 行（关键上下文）
            echo "### 📄 日志末尾 60 行" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            tail -60 "$LOG"
            echo '```' >> $GITHUB_STEP_SUMMARY

            # Gradle 配置缓存问题可能
            echo "### 🔍 Gradle 配置缓存状态" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -i "configuration cache\|build cache\|cache" "$LOG" 2>/dev/null | head -20 || echo "(无匹配)"
            echo '```' >> $GITHUB_STEP_SUMMARY

            # 网络/仓库问题
            echo "### 🌐 仓库/网络诊断" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            grep -i -E "(repository|maven|jcenter|google\(\)|dl\.google|proxy|timed out|connection refused|connection reset|unreachable)" "$LOG" 2>/dev/null | head -20 || echo "(无匹配)"
            echo '```' >> $GITHUB_STEP_SUMMARY
          else
            echo "⚠️ 未找到构建日志文件" >> $GITHUB_STEP_SUMMARY
          fi

      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "gradle-build-log"
          path: /tmp/gradle-build.log
          retention-days: 30

      - name: 检查构建结果
        if: always()
        run: |
          if [ -f /tmp/gradle-exit-code.txt ]; then
            source /tmp/gradle-exit-code.txt
            echo "构建退出码: ${EXIT_CODE}"
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "❌ 构建失败，退出码: ${EXIT_CODE}"
              exit ${EXIT_CODE}
            fi
          else
            echo "⚠️ 未找到退出码文件，构建可能未执行"
          fi
          echo "## ✅ 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 构建成功" >> $GITHUB_STEP_SUMMARY

      - name: 上传 APK 产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: "PriorityLocker-Pro-${{ inputs.build_type || 'release' }}"
          path: |
            app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      - name: APK 信息
        if: success()
        run: |
          echo "## ✅ 构建产物" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '| 文件 | 大小 |' >> $GITHUB_STEP_SUMMARY
          echo '|------|------|' >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk -name "*.apk" | while read apk; do
            SIZE=$(du -h "$apk" | cut -f1)
            NAME=$(basename "$apk")
            echo "| \`${NAME}\` | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
          done

      - name: 上传到 Release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk

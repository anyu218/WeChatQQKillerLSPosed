# ============================================================
# PriorityLocker Pro — 纯 ./gradlew 构建（调试版：捕获完整日志）
# ============================================================
name: Build APK

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - '.gitignore'
  pull_request:
    branches: [ main, master ]
  release:
    types: [ published ]
  workflow_dispatch:
    inputs:
      build_type:
        description: '构建类型'
        required: true
        default: 'release'
        type: choice
        options:
          - release
          - debug

jobs:
  build:
    name: "构建 ${{ inputs.build_type || 'release' }} APK"
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # 1. 检出代码
      # --------------------------------------------------
      - name: 检出仓库
        uses: actions/checkout@v4

      # --------------------------------------------------
      # 2. JDK 17（AGP 8.x + Gradle 8.x 必需）
      # --------------------------------------------------
      - name: 设置 JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      # --------------------------------------------------
      # 3. 确认 SDK 版本
      # --------------------------------------------------
      - name: 安装 Android SDK 组件
        run: |
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "ANDROID_SDK_ROOT=$ANDROID_SDK_ROOT"
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager \
            "platforms;android-34" \
            "build-tools;34.0.0" \
            2>&1 | tail -5 || echo "⚠️ sdkmanager 不可用，尝试默认 SDK"

      # --------------------------------------------------
      # 4. 诊断环境
      # --------------------------------------------------
      - name: 诊断环境
        run: |
          echo "## 🔧 环境诊断" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "PWD: $(pwd)"
          java -version 2>&1
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "GRADLE_VERSION via wrapper:" 
          chmod +x gradlew
          ./gradlew --version --no-daemon 2>&1 || echo "gradlew --version failed"
          echo '```' >> $GITHUB_STEP_SUMMARY

      # --------------------------------------------------
      # 5. 构建 APK（捕获完整日志到文件）
      # --------------------------------------------------
      - name: 构建 APK
        continue-on-error: true  # 即使失败也继续后续步骤
        run: |
          BUILD_TYPE="${{ inputs.build_type || 'release' }}"
          echo "📦 构建类型: ${BUILD_TYPE}"
          CAP_TYPE=$(echo "${BUILD_TYPE}" | sed 's/^./\U&/')
          echo "🧩 命名空间: com.murong.prioritylocker"
          echo ""

          # 捕获日志到文件 + 终端
          ./gradlew assemble${CAP_TYPE} --no-daemon --stacktrace 2>&1 | tee /tmp/gradle-build.log
          
          # 记录退出码到文件，供后续步骤读取
          echo "EXIT_CODE=${PIPESTATUS[0]}" > /tmp/gradle-exit-code.txt
          echo "=== 构建退出码: ${PIPESTATUS[0]} ==="

      # --------------------------------------------------
      # 6. 上传构建日志（无论成功失败）
      # --------------------------------------------------
      - name: 上传构建日志
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: "gradle-build-log"
          path: /tmp/gradle-build.log
          retention-days: 30

      # --------------------------------------------------
      # 7. 显式标记构建失败（基于记录的退出码）
      # --------------------------------------------------
      - name: 检查构建结果
        if: always()
        run: |
          if [ -f /tmp/gradle-exit-code.txt ]; then
            source /tmp/gradle-exit-code.txt
            echo "构建退出码: ${EXIT_CODE}"
            if [ "${EXIT_CODE}" != "0" ]; then
              echo "❌ 构建失败，退出码: ${EXIT_CODE}"
              exit ${EXIT_CODE}
            fi
          else
            echo "⚠️ 未找到退出码文件，构建可能未执行"
          fi
          echo "## 📋 构建结果" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "✅ 构建成功" >> $GITHUB_STEP_SUMMARY

      # --------------------------------------------------
      # 8. 上传 APK 为构建产物（仅在成功时）
      # --------------------------------------------------
      - name: 上传 APK 产物
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: "PriorityLocker-Pro-${{ inputs.build_type || 'release' }}"
          path: |
            app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30

      # --------------------------------------------------
      # 9. 输出 APK 摘要
      # --------------------------------------------------
      - name: APK 信息
        if: success()
        run: |
          echo "## ✅ 构建产物" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo '| 文件 | 大小 |' >> $GITHUB_STEP_SUMMARY
          echo '|------|------|' >> $GITHUB_STEP_SUMMARY
          find app/build/outputs/apk -name "*.apk" | while read apk; do
            SIZE=$(du -h "$apk" | cut -f1)
            NAME=$(basename "$apk")
            echo "| \`${NAME}\` | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
          done

      # --------------------------------------------------
      # 10. 如果打了 tag，上传到 Release
      # --------------------------------------------------
      - name: 上传到 Release
        if: github.event_name == 'release' && success()
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/*.apk
